server:
  port: 8080

spring:
  application:
    name: campus-marketplace

  datasource:
    url: jdbc:mysql://localhost:3306/campus_marketplace?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: CampusMarketplaceSecretKey2026VeryLongSecretKeyForHS256Algorithm
  expiration: 604800000  # 7 days in milliseconds

file:
  upload-path: ./uploads/
  access-url: /uploads/

springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
